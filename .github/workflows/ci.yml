name: Github Actions for Java Backend Automation Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '18'

      - name: Build project
        run: mvn clean compile # Компиляция проекта


  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '18'

      - name: Run tests
        run: mvn test # запуск TestNG тестов
        continue-on-error: true # Разрешаем шагу с тестами завершаться без падения job даже если будут ошибки

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results # также как в проекте тесты сохраняются в папке allure-results


  report:
    runs-on: ubuntu-latest
    needs: test
    if: always() # Запуск создания отчёта даже при завалившихся тестах

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Generate Allure report
        run: mvn allure:report # создание отчётов

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin # сохранение отчётов как GitHub artifact