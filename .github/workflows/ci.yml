name: Java API Automation Project - Allure Report CI/CD

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 18
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18

      - name: Build project
        run: mvn clean compile


  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 18
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18

      - name: Run tests
        run: mvn test
        continue-on-error: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results


  report:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure report
        run: mvn allure:report -Dallure.results.directory=allure-results -Dallure.report.directory=allure-report

      - name: Zip Allure report
        run: zip -r allure-report.zip allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-zip
          path: allure-report.zip


  deploy:
    runs-on: ubuntu-latest
    needs: report
    if: always()
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REPO_NAME: ${{ github.repository }}
      USER_NAME: ${{ github.actor }}
    steps:
      - name: Force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report-zip
          path: allure-report.zip

      - name: Unzip Allure report
        run: unzip -o allure-report.zip -d allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report/
          publish_branch: gh-pages
          force_orphan: false
          user_name: github-actions
          user_email: github-actions@github.com
          enable_jekyll: false  # отключаем Jekyll, чтобы корректно открывались все файлы

      - name: Show GitHub Pages URL
        run: |
          URL="https://${USER_NAME}.github.io/${REPO_NAME}/"
          echo "📌 Your Allure report is published at: $URL"
          echo "::notice title=Allure Report::Your Allure report is available [here]($URL)"