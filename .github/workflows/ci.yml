name: Github Actions for Java API Automation Project

on:
  push:
    branches: [ main ]

# Без этого блока GITHUB_TOKEN read-only → git push в gh-pages падает с exit code 128
permissions:
  contents: write

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18
          cache: maven           # кешируем ~/.m2 по хешу pom.xml

      - name: Build
        run: mvn clean compile -B

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18
          cache: maven

      - name: Run tests
        run: mvn test -B
        continue-on-error: true  # не блокируем report если тесты упали

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          # Allure Maven плагин пишет результаты именно сюда
          path: target/allure-results


  report:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18
          cache: maven           # нужен mvn для allure:report

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          # кладём туда, откуда allure:report их читает
          path: target/allure-results

      - name: Generate Allure report
        run: mvn allure:report -B

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin


  deploy:
    runs-on: ubuntu-latest
    needs: report
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages