name: Java Backend Automation Project

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 18
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18

      - name: Build project
        run: mvn clean compile


  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 18
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18

      - name: Run tests
        run: mvn test
        continue-on-error: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results


  report:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure report
        run: mvn allure:report -Dallure.results.directory=allure-results -Dallure.report.directory=allure-report

      - name: Zip Allure report
        run: |
          zip -r allure-report.zip allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-zip
          path: allure-report.zip


  deploy:
    runs-on: ubuntu-latest
    needs: report
    if: always()
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REPO_NAME: ${{ github.repository }}
      USER_NAME: ${{ github.actor }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report-zip
          path: allure-report.zip

      - name: Unzip Allure report
        run: unzip -o allure-report.zip -d allure-report

      # Проверяем, существует ли ветка gh-pages, если нет — создаём пустую ветку
      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code origin gh-pages; then
            echo "Branch gh-pages does not exist. Creating..."
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "Initial gh-pages commit"
            git push origin gh-pages
            git checkout main
          else
            echo "Branch gh-pages exists."
          fi

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions
          user_email: github-actions@github.com

      - name: Print GitHub Pages URL
        run: |
          echo "Отчёт доступе по ссылке:"
          echo "https://${USER_NAME}.github.io/${REPO_NAME}/"